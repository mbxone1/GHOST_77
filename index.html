<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NionChat - دردشة مشفرة</title>
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* خلفية */
    .bg-grid {
      background-image: 
        linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    /* Glassmorphism */
    .glass {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
    }

    /* Neon glow */
    .neon-green { color: #00ff88; text-shadow: 0 0 20px rgba(0,255,136,0.5); }
    .neon-pink { color: #ff6b9d; text-shadow: 0 0 20px rgba(255,107,157,0.5); }
    
    .btn-green {
      background: #00ff88;
      color: #0a0a0a;
      border: none;
      padding: 15px 30px;
      border-radius: 12px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 0 20px rgba(0,255,136,0.3);
    }
    .btn-green:hover {
      box-shadow: 0 0 40px rgba(0,255,136,0.6);
      transform: scale(1.02);
    }

    .btn-pink {
      background: #ff6b9d;
      color: #0a0a0a;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
    }

    /* Inputs */
    input {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 15px 20px;
      border-radius: 12px;
      font-size: 16px;
      width: 100%;
      transition: all 0.3s;
    }
    input:focus {
      outline: none;
      border-color: #00ff88;
      box-shadow: 0 0 20px rgba(0,255,136,0.2);
    }
    input::placeholder { color: rgba(255,255,255,0.3); }

    /* الشاشات */
    .screen {
      display: none;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .screen.active { display: flex; }

    /* الرسائل */
    .message {
      max-width: 70%;
      padding: 12px 18px;
      border-radius: 18px;
      margin-bottom: 10px;
      animation: slideIn 0.3s ease;
      word-break: break-word;
    }
    .message.mine {
      background: rgba(0,255,136,0.1);
      border: 1px solid rgba(0,255,136,0.3);
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }
    .message.other {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-bottom-left-radius: 4px;
    }
    .message.system {
      background: transparent;
      border: none;
      text-align: center;
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      max-width: 100%;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* الكتابة */
    .typing-dot {
      width: 8px; height: 8px;
      background: #00ff88;
      border-radius: 50%;
      display: inline-block;
      animation: bounce 1.4s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-10px); }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #00ff88; border-radius: 3px; }

    /* Header */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: rgba(10,10,10,0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 15px 20px;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* Chat area */
    .chat-container {
      padding-top: 80px;
      padding-bottom: 100px;
      max-width: 800px;
      margin: 0 auto;
      height: 100vh;
      overflow-y: auto;
    }

    /* Input area */
    .input-area {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.1);
      padding: 15px 20px;
      display: flex;
      gap: 10px;
      align-items: center;
      max-width: 800px;
      margin: 0 auto;
      left: 50%;
      transform: translateX(-50%);
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .status-online { background: #00ff88; box-shadow: 0 0 10px #00ff88; }
    .status-offline { background: #ff4444; }

    /* Animations */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    .float { animation: float 6s ease-in-out infinite; }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.3;
      pointer-events: none;
    }
  </style>
</head>
<body class="bg-grid">

  <!-- خلفية -->
  <div class="orb" style="width:400px;height:400px;background:#00ff88;top:-100px;left:-100px;animation:float 8s infinite"></div>
  <div class="orb" style="width:300px;height:300px;background:#ff6b9d;bottom:-50px;right:-50px;animation:float 10s infinite 2s"></div>

  <!-- ====== شاشة الترحيب ====== -->
  <div id="welcomeScreen" class="screen active">
    <div class="glass" style="padding:40px;text-align:center;max-width:400px;width:100%">
      <div style="font-size:48px;margin-bottom:10px">🔒</div>
      <h1 style="font-size:36px;font-weight:bold;margin-bottom:5px" class="neon-green">NION CHAT</h1>
      <p style="color:rgba(255,255,255,0.5);margin-bottom:30px">دردشة مشفرة • ما كاين حتى تخزين</p>
      
      <input type="text" id="nicknameInput" placeholder="سّميتك..." maxlength="20" style="margin-bottom:15px">
      
      <button class="btn-green" onclick="startChat()" style="width:100%">
        دخل للدردشة
      </button>
      
      <div style="margin-top:20px;display:flex;gap:15px;justify-content:center;font-size:12px;color:rgba(255,255,255,0.4)">
        <span>🔐 تشفير كامل</span>
        <span>💾 RAM فقط</span>
        <span>⚡ فوري</span>
      </div>
    </div>
  </div>

  <!-- ====== شاشة الغرف ====== -->
  <div id="roomsScreen" class="screen">
    <div style="max-width:400px;width:100%">
      <h2 style="text-align:center;margin-bottom:30px">مرحبا <span class="neon-green" id="userNickname"></span></h2>
      
      <div class="glass" style="padding:30px;margin-bottom:20px;cursor:pointer;transition:all 0.3s" onmouseover="this.style.transform='scale(1.02)'" onmouseout="this.style.transform='scale(1)'" onclick="createRoom()">
        <h3 class="neon-green" style="margin-bottom:5px">➕ غرفة جديدة</h3>
        <p style="color:rgba(255,255,255,0.5);font-size:14px">دردشة خاصة 1 على 1</p>
      </div>

      <div class="glass" style="padding:30px;margin-bottom:20px">
        <h3 class="neon-pink" style="margin-bottom:10px">🔗 انضم لغرفة</h3>
        <div style="display:flex;gap:10px">
          <input type="text" id="joinRoomId" placeholder="كود الغرفة..." style="flex:1;text-transform:uppercase">
          <button class="btn-pink" onclick="joinRoom()">دخل</button>
        </div>
      </div>

      <div id="createdRoom" style="display:none;text-align:center;margin-top:20px">
        <p style="color:rgba(255,255,255,0.5);margin-bottom:10px">كود الغرفة ديالك:</p>
        <div style="font-size:32px;font-weight:bold;letter-spacing:5px" class="neon-green" id="roomCodeDisplay"></div>
        <p style="color:rgba(255,255,255,0.3);font-size:12px;margin-top:10px">بعت هاد الكود للصاحب ديالك</p>
      </div>
    </div>
  </div>

  <!-- ====== شاشة الدردشة ====== -->
  <div id="chatScreen" class="screen" style="display:none;flex-direction:column;padding:0">
    <!-- Header -->
    <div class="header">
      <div>
        <h3 style="font-size:16px">غرفة: <span class="neon-green" id="chatRoomId"></span></h3>
        <div style="font-size:12px;color:rgba(255,255,255,0.5)">
          <span class="status-dot status-online"></span>
          <span id="onlineCount">1</span> متصل
        </div>
      </div>
      <button onclick="leaveRoom()" style="background:rgba(255,255,255,0.1);border:none;color:#fff;padding:8px 16px;border-radius:8px;cursor:pointer">خروج</button>
    </div>

    <!-- Messages -->
    <div class="chat-container" id="messagesContainer"></div>

    <!-- Typing indicator -->
    <div id="typingIndicator" style="display:none;position:fixed;bottom:80px;left:20px;color:rgba(255,255,255,0.5);font-size:12px">
      <span id="typingName"></span> كيكتب
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
    </div>

    <!-- Input -->
    <div class="input-area">
      <input type="text" id="messageInput" placeholder="كتب رسالة مشفرة..." style="flex:1" onkeypress="handleKeyPress(event)" oninput="handleTyping()">
      <button class="btn-green" onclick="sendMessage()" style="padding:12px 20px">📤</button>
    </div>
  </div>

  <script>
    // ====== VARIABLES ======
    let socket = null;
    let nickname = '';
    let roomId = '';
    let typingTimeout = null;
    let myPublicKey = '';
    let myPrivateKey = '';

    // ====== CRYPTO (بسيط) ======
    function generateKeys() {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
      let key = '';
      for(let i=0; i<32; i++) key += chars.charAt(Math.floor(Math.random() * chars.length));
      return key;
    }

    function encrypt(text, key) {
      let result = '';
      for(let i=0; i<text.length; i++) {
        result += String.fromCharCode(text.charCodeAt(i) ^ key.charCodeAt(i % key.length));
      }
      return btoa(result);
    }

    function decrypt(encrypted, key) {
      try {
        const text = atob(encrypted);
        let result = '';
        for(let i=0; i<text.length; i++) {
          result += String.fromCharCode(text.charCodeAt(i) ^ key.charCodeAt(i % key.length));
        }
        return result;
      } catch(e) { return '[مشفر]'; }
    }

    // ====== START ======
    function startChat() {
      const input = document.getElementById('nicknameInput');
      nickname = input.value.trim();
      if(nickname.length < 2) {
        alert('سّميتك خاصها تكون 2 حروف على الأقل!');
        return;
      }

      // Generate keys
      myPrivateKey = generateKeys();
      myPublicKey = generateKeys();

      document.getElementById('userNickname').textContent = nickname;
      showScreen('roomsScreen');
      connectSocket();
    }

    // ====== SOCKET ======
    function connectSocket() {
      // استخدم نفس الرابط (للنشر على Railway)
      const serverUrl = window.location.origin;
      socket = io(serverUrl);

      socket.on('connect', () => console.log('✅ متصل'));
      socket.on('disconnect', () => console.log('❌ منفصل'));

      socket.on('room-created', ({ roomId: id }) => {
        roomId = id;
        document.getElementById('roomCodeDisplay').textContent = id;
        document.getElementById('createdRoom').style.display = 'block';
        joinRoomById(id);
      });

      socket.on('joined-room', ({ roomId: id, users }) => {
        roomId = id;
        document.getElementById('chatRoomId').textContent = id;
        document.getElementById('onlineCount').textContent = users.length;
        showScreen('chatScreen');
      });

      socket.on('user-joined', ({ nickname: name }) => {
        addMessage('system', `${name} دخل للغرفة`);
        updateOnlineCount(1);
      });

      socket.on('user-left', ({ nickname: name }) => {
        addMessage('system', `${name} خرج من الغرفة`);
        updateOnlineCount(-1);
      });

      socket.on('new-message', ({ sender, encrypted, timestamp }) => {
        // فك التشفير
        const decrypted = decrypt(encrypted, myPrivateKey);
        addMessage('other', decrypted, sender);
      });

      socket.on('user-typing', ({ nickname: name, isTyping }) => {
        const indicator = document.getElementById('typingIndicator');
        const typingName = document.getElementById('typingName');
        if(isTyping) {
          typingName.textContent = name;
          indicator.style.display = 'block';
        } else {
          indicator.style.display = 'none';
        }
      });

      socket.on('error', (msg) => alert('خطأ: ' + msg));
    }

    // ====== ROOM ACTIONS ======
    function createRoom() {
      socket.emit('create-room', { nickname });
    }

    function joinRoom() {
      const id = document.getElementById('joinRoomId').value.trim().toUpperCase();
      if(id) joinRoomById(id);
    }

    function joinRoomById(id) {
      socket.emit('join-room', { roomId: id, nickname });
    }

    function leaveRoom() {
      socket.disconnect();
      location.reload();
    }

    // ====== MESSAGING ======
    function sendMessage() {
      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      if(!text) return;

      // تشفير
      const encrypted = encrypt(text, myPrivateKey);

      // بعت
      socket.emit('send-message', {
        roomId,
        encrypted,
        timestamp: Date.now()
      });

      // وري فالشاشة
      addMessage('mine', text);
      input.value = '';
      stopTyping();
    }

    function handleKeyPress(e) {
      if(e.key === 'Enter') sendMessage();
    }

    function handleTyping() {
      socket.emit('typing', { roomId, isTyping: true });
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(stopTyping, 2000);
    }

    function stopTyping() {
      socket.emit('typing', { roomId, isTyping: false });
    }

    // ====== UI ======
    function addMessage(type, content, sender) {
      const container = document.getElementById('messagesContainer');
      const div = document.createElement('div');
      div.className = `message ${type}`;
      
      if(type === 'system') {
        div.textContent = content;
      } else {
        if(type === 'other') {
          div.innerHTML = `<div style="font-size:12px;color:#00ff88;margin-bottom:4px">${sender}</div>${content}`;
        } else {
          div.textContent = content;
        }
      }
      
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function updateOnlineCount(change) {
      const count = document.getElementById('onlineCount');
      count.textContent = parseInt(count.textContent) + change;
    }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      const screen = document.getElementById(id);
      if(screen) screen.classList.add('active');
    }
  </script>
</body>
</html>
